name: self_refine
library: langchain
chain_type: LLMChain

prompts:
  system: |
    You are a helpful assistant. Provide a thorough answer to the question.
  user_exam: |
    {question}

    {options_text}

    Please think step by step and provide your answer on the last line as: Answer: X
  user_qa: |
    {question}

    Please provide a thorough answer. Put your final answer on the last line as: Answer: <your answer>
  feedback: |
    Question: {question}

    Previous answer:
    {previous_answer}

    Please critique this answer. Identify any errors, gaps, or areas for improvement. Be specific and constructive.
  refine_exam: |
    Question: {question}

    Previous answer:
    {previous_answer}

    Feedback:
    {feedback}

    Based on the feedback, provide an improved answer. Put your final answer on the last line as: Answer: X
  refine_qa: |
    Question: {question}

    Previous answer:
    {previous_answer}

    Feedback:
    {feedback}

    Based on the feedback, provide an improved answer. Put your final answer on the last line as: Answer: <your answer>

generation:
  temperature: 0.0
  max_tokens: 2048

refine_config:
  max_rounds: 3

parse:
  answer_pattern: "[Aa]nswer\\s*[：:]\\s*(.+)"
  choice_pattern: "\\b([A-D])\\b"
  trace_split: "\n"
