provider: openai
base_url: "${OPENAI_BASE_URL}"
api_key: "${OPENAI_API_KEY}"

# Available models under this provider
models:
  - gpt-4o
  - gpt-4o-mini
  - gpt-4-turbo
  - gpt-3.5-turbo
  - o1-preview
  - o1-mini

# Default parameters for all models
temperature: 0.0
top_p: 1.0
max_tokens: 2048
seed: 42

system_prompt: "You are a helpful assistant."

batch_size: 10
request_timeout_s: 60
