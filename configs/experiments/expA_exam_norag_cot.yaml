# 实验A 对照组: text_exam + CoT + 无RAG
experiment_id: expA_exam_norag_cot
model:
  provider: deepseek
  model: deepseek-chat
strategy: cot
prompt_id: text_exam.cot
dataset_path: data/benchmark/text_exam/demo_exam_v1.jsonl
concurrency: 3
evaluators:
  - choice_accuracy
  - option_bias
  - latency_stats
  - token_stats
  - avg_trace_tokens
group_by:
  - difficulty
  - metadata.topic
