# 实验A 实验组: text_exam + direct + RAG oracle模式
experiment_id: expA_exam_rag_oracle_direct
model:
  provider: deepseek
  model: deepseek-chat
strategy: direct
prompt_id: text_exam.direct
dataset_path: data/benchmark/text_exam/demo_exam_v1.jsonl
concurrency: 3
rag:
  enabled: true
  mode: oracle
  oracle_chunks_file: data/rag/oracle_exam_chunks.jsonl
evaluators:
  - choice_accuracy
  - option_bias
  - latency_stats
  - token_stats
group_by:
  - difficulty
  - metadata.topic
