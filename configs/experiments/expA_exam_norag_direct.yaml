# 实验A 对照组: text_exam + direct + 无RAG
experiment_id: expA_exam_norag_direct
model:
  provider: deepseek
  model: deepseek-chat
strategy: direct
prompt_id: text_exam.direct
dataset_path: data/benchmark/text_exam/demo_exam_v1.jsonl
