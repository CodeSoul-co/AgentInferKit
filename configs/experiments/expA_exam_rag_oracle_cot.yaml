# 实验A 实验组: text_exam + CoT + RAG oracle模式
experiment_id: expA_exam_rag_oracle_cot
model:
  provider: deepseek
  model: deepseek-chat
strategy: cot
prompt_id: text_exam.cot
dataset_path: data/benchmark/text_exam/demo_exam_v1.jsonl
concurrency: 3
rag:
  enabled: true
  mode: oracle
  oracle_chunks_file: data/rag/oracle_exam_chunks.jsonl
evaluators:
  - choice_accuracy
  - option_bias
  - latency_stats
  - token_stats
  - avg_trace_tokens
group_by:
  - difficulty
  - metadata.topic
