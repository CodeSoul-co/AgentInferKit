# ---------------------------------------------------------------------------
# ToT BFS prompts for Open-ended Question Answering (text_qa)
#
# Design follows the vendor ToT pattern:
#   - Few-shot examples showing multi-step reasoning
#   - Evaluation with worked examples of sure/likely/impossible
#   - Structured decomposition of complex questions
# ---------------------------------------------------------------------------

# Generation: expand candidate reasoning at each BFS depth (CoT mode)
generate_cot: |
  Answer the following question by breaking it down into smaller reasoning steps. At each step, address one aspect of the question.

  Example:
  Question: Why do leaves change color in autumn?
  Step 1: During spring and summer, leaves produce chlorophyll which gives them a green color.
  Step 2: As days shorten in autumn, trees reduce chlorophyll production.
  Step 3: With less chlorophyll, other pigments (carotenoids, anthocyanins) become visible, producing yellow, orange, and red colors.
  Answer: Leaves change color because reduced chlorophyll production reveals other pigments.

  Now solve this question:
  {problem}
  {thoughts}

# Generation: standard mode (single concise step)
generate_standard: |
  Answer the following question. Provide the next step of reasoning. Be concise and factual.

  {problem}
  {thoughts}

# Evaluation: score each candidate reasoning path (value mode, with few-shot)
evaluate_value: |
  Evaluate if the following reasoning about a question is correct and complete. Rate as: sure/likely/impossible.

  Example 1:
  Question: What is the boiling point of water at sea level?
  Reasoning: Water boils at 100 degrees Celsius (212F) at standard atmospheric pressure at sea level.
  Evaluation: This is a well-known scientific fact, correctly stated.
  sure

  Example 2:
  Question: How does photosynthesis work?
  Reasoning: Plants absorb sunlight through their roots.
  Evaluation: Photosynthesis occurs in leaves (chloroplasts), not roots. This reasoning has a fundamental error.
  impossible

  Example 3:
  Question: Why is the sky blue?
  Reasoning: It has something to do with how sunlight interacts with the atmosphere.
  Evaluation: The direction is correct (Rayleigh scattering) but the explanation is too vague and incomplete.
  likely

  Now evaluate:
  Question: {problem}
  Reasoning: {thoughts}
  Evaluation:

# Evaluation: vote for the most promising candidate (vote mode)
evaluate_vote: |
  Given a question and several candidate reasoning paths, decide which reasoning is most accurate and complete. Analyze each choice, then conclude with "The best choice is {{s}}" where s is the integer id.

  Question: {problem}

  {choices}

  Analyze each reasoning path and conclude with "The best choice is {{s}}".

# Final answer extraction after BFS completes
extract_answer: |
  {problem}

  Based on the following analysis:
  {best_candidate}

  Provide a clear and concise final answer.
  Answer:
