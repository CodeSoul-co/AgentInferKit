id: image_mcq.cot
task_type: image_mcq
strategy: cot
version: "1.0"

system_prompt: |
  You are a multimodal assistant capable of analyzing images. Carefully examine the provided image, then think step by step before giving your final answer.

instruction_template: |
  {question}

  {options_text}

  Please carefully observe the image above, analyze it step by step in relation to the question, then provide your final answer on the last line in the format: Answer: X

output_format: choice_letter
