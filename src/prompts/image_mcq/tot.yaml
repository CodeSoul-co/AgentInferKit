id: image_mcq.tot
task_type: image_mcq
strategy: tot
version: "1.0"

system_prompt: |
  You are a construction safety expert. Analyze images and identify safety hazards by systematically evaluating each option against relevant safety regulations.

instruction_template: |
  {question}

  {options_text}

  Analyze each option step by step based on the image, then provide your answer. End with: Answer: X

output_format: choice_letter

# ---------------------------------------------------------------------------
# ToT BFS prompt templates
# These are used by BenchmarkTask during tree search. Each template uses
# few-shot examples from real construction safety inspection data.
# ---------------------------------------------------------------------------

# Generation: expand candidate reasoning at each BFS depth (CoT mode)
# Teaches the model to analyze options one by one against safety regulations.
generate_cot: |
  Answer the following construction safety multiple-choice question by analyzing each option step by step. At each step, evaluate one option against relevant safety regulations and determine if it matches the hazard shown.

  Example:
  Question: 观察图片，该施工现场存在的主要安全隐患是什么？
  A. 气瓶未设置防倾倒措施且间距不足
  B. 作业人员未佩戴安全帽进行高处焊接
  C. 动火作业现场未配备灭火器且无专人监护
  D. 电焊机一次侧电源线长度超过规范要求
  Step 1: 检查选项A——根据GB50720-2011第6.3.3条，气瓶应有防倾倒措施且间距不小于5m。图片中气瓶状况需观察，但这不是最突出的隐患。暂时保留。
  Step 2: 检查选项B——观察图片中作业人员，已佩戴安全帽。排除B。
  Step 3: 检查选项C——根据GB50720-2011第6.3.1条，动火作业必须配备灭火器材并设置监护人。图片中动火点既无灭火器也无监护人，严重违规。C很可能正确。
  Step 4: 检查选项D——电焊机电源线长度在图片中难以判断，且非典型隐患。排除D。
  Answer: C

  Now solve this question:
  {problem}
  {thoughts}

# Generation: standard mode (single concise step)
generate_standard: |
  Answer the following construction safety question. Provide the next step of analysis by evaluating one option against safety regulations. Be concise.

  Example:
  Question: 该施工现场材料仓库存在的主要安全隐患是什么？
  A. 仓库内安全疏散通道被杂物严重堵塞
  B. 仓库内灭火器配置数量不足且被遮挡
  C. 仓库内电气线路敷设混乱且未穿管保护
  D. 易燃易爆危险品未在专用库房分类存放
  Step: 根据GB50720-2011第6.2.2条，油漆桶、气瓶等易燃易爆品与普通可燃材料混存，未设置专用库房，答案是D。

  Now provide the next step for:
  {problem}
  {thoughts}

# Evaluation: score each candidate reasoning path (value mode, with few-shot)
evaluate_value: |
  Evaluate if the following safety hazard analysis is leading to the correct answer. Consider whether the reasoning correctly applies safety regulations to what is visible in the image. Rate as: sure/likely/impossible.

  Example 1:
  Question: 观察图片，该施工现场存在的主要安全隐患是什么？
  A. 气瓶未设置防倾倒措施  B. 乙炔瓶未安装回火防止器  C. 气瓶存放区未配备灭火器  D. 气瓶与动火作业点距离不足
  Reasoning: 根据GB50720-2011第6.3.3.1条，严禁使用回火防止器缺损的乙炔瓶。回火防止器是防止火焰回燃引发气瓶爆炸的关键安全装置。图片中乙炔瓶确实缺少回火防止器。
  Evaluation: 推理正确引用了具体法规条款，且与图片观察一致。
  sure

  Example 2:
  Question: 该施工现场生活区宿舍存在的主要安全隐患是什么？
  A. 宿舍内私拉乱接电线并使用大功率电器  B. 安全疏散通道被杂物堵塞占用  C. 使用明火或违规存放易燃液体  D. 灭火器配置数量不足且未定期检查
  Reasoning: 宿舍看起来有点乱，可能是疏散通道堵塞的问题。
  Evaluation: 推理过于笼统，没有引用具体法规，也没有仔细观察图片中的电气线路情况。
  likely

  Example 3:
  Question: 该施工现场存在的主要安全隐患是什么？
  A. 气瓶间距不足且未固定  B. 气瓶压力表损坏  C. 气瓶未设置专用库房  D. 作业人员未佩戴护目镜
  Reasoning: 图片中工人没有戴护目镜，这是最大的安全隐患。
  Evaluation: 护目镜属于个人防护问题，而气瓶间距不足和未固定属于火灾爆炸风险，后者更为严重。推理方向错误。
  impossible

  Now evaluate:
  Question: {problem}
  Reasoning: {thoughts}
  Evaluation:

# Evaluation: vote for the most promising candidate (vote mode)
evaluate_vote: |
  Given a construction safety question and several candidate analyses, decide which analysis most accurately identifies the safety hazard. Consider regulation compliance, image observation accuracy, and hazard severity. Analyze each choice in detail, then conclude in the last line "The best choice is {{s}}", where s is the integer id of the choice.

  Question: {problem}

  {choices}

# Final answer extraction after BFS completes
extract_answer: |
  {problem}

  Based on the following safety analysis:
  {best_candidate}

  What is the correct answer? Respond with only the letter (A, B, C, or D).
  Answer:
