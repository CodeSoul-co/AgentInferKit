name: direct
library: langchain
chain_type: LLMChain

prompts:
  system: ""
  user_exam: |
    {question}

    {options_text}

    Please provide only the letter of the correct answer.
  user_qa: |
    {question}
  user_default: |
    {user_goal}

generation:
  temperature: 0.0
  max_tokens: 1024

parse:
  answer_pattern: "\\b([A-D])\\b"
  trace_split: "\n"
